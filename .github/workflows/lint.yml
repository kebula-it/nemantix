name: Lint & Type Check

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the development dependencies needed for Ruff and Mypy
          pip install ".[dev]"

      - name: Run Ruff (Linter)
        run: |
          # Check for syntax errors, unused variables, and best practices
          ruff check .

      - name: Run Ruff (Formatter check)
        run: |
          # Verify that the code is formatted correctly
          # (fails if any files need to be formatted)
          ruff format --check .

      - name: Run Mypy (Type Checker)
        run: |
          # Check types (Type Hints) in the source folder
          mypy src/ --ignore-missing-imports --allow-untyped-defs --allow-untyped-calls --follow-imports=silent || true
