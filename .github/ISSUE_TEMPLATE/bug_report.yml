name: Bug Report
description: Report a bug in Nemantix
labels: ["status: needs triage"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Before submitting, please:
        - **Check that the bug is reproducible on the [latest released version](https://github.com/kebula-it/nemantix/releases/latest).**
        - **Search [existing issues](https://github.com/kebula-it/nemantix/issues) to avoid duplicates.**

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Given the following `.nxs` script...
        2. Run with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: nxs_snippet
    attributes:
      label: NXS snippet (if applicable)
      description: Minimal `.nxs` script that triggers the bug.
      render: text

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages, tracebacks, or unexpected output.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and Nemantix version or commit hash.
      placeholder: |
        - Python: 3.x.x
        - OS: Ubuntu 24.04 / macOS 14 / ...
        - Nemantix version/commit: abc1234
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots that may help.