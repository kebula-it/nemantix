repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      # 1. Linter: Checks for logic errors, unused imports, etc.
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # 2. Formatter: Replaces Black for spacing, quotes, and line lengths
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
